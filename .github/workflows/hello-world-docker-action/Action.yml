name: Hello world docker action
description: 'say hello to a user or the world'
inputs:
  who-to-greet:
    description: 'Who to greet'
    required: true
    default: World
outputs:
  time:
    description: 'the time we said hello'
runs:
  using: docker
  image: 'Dockerfile'
  args:
    - ${{ inputs.who-to-greet }}
